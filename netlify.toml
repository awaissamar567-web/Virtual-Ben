[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Omit scanning the compiled Next.js build chunks, since they naturally contain compiled env variables
  SECRETS_SCAN_OMIT_PATHS = ".netlify/.next/**,.next/**"
  
  # Tell the scanner that all these project variables are safe and handled
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY,GROQ_API_KEY,USDA_API_KEY,WGER_API_KEY,CLERK_SECRET_KEY,GEMINI_API_KEY"
